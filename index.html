<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barboseiras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="brand-kicker">PROJETO PESSOAL</p>
      <h1>Barboseiras</h1>
      <p class="subtitle">um local para que o Barbosa expurgue suas ideias.</p>
    </div>
  </header>

  <main class="container">
    <section class="composer card">
      <h2>Novo post</h2>
      <form id="postForm" class="form">
        <label>
          Tipo
          <select id="type" required>
            <option value="filme">Filme</option>
            <option value="serie">Série de TV</option>
            <option value="livro">Livro</option>
            <option value="quadrinhos">Quadrinhos</option>
            <option value="videogame">Video Games</option>
            <option value="corrida">Corridas</option>
            <option value="musica">Músicas</option>
            <option value="album">Álbuns</option>
            <option value="livre">Post livre</option>
          </select>
        </label>

        <label>
          Título
          <input id="title" type="text" placeholder="Ex.: Blade Runner" required />
        </label>

        <label>
          Data
          <input id="date" type="date" required />
        </label>

        <label>
          Nota (opcional)
          <input id="rating" type="number" min="0" max="10" step="0.5" placeholder="0 a 10" />
        </label>

        <label id="kmField" class="hidden">
          Quilometragem (km)
          <input id="km" type="number" min="0" step="0.01" placeholder="Ex.: 7.30" />
        </label>

        <label class="full">
          Texto
          <textarea id="content" rows="6" placeholder="Escreva seu post/review..."></textarea>
        </label>

        <button type="submit">Publicar</button>
      </form>
      <p id="postStatus" class="feedback"></p>
    </section>


    <section class="card">
      <h2>Sincronizar Letterboxd</h2>
      <div class="sync-row">
        <input id="letterboxdUser" type="text" placeholder="username do Letterboxd" />
        <button id="syncLetterboxdBtn" type="button">Sincronizar</button>
      </div>
      <p id="syncStatus" class="feedback"></p>
      <div id="imports" class="list"></div>
    </section>

    <section class="card">
      <div class="view-switch">
        <button class="switch active" data-view="timeline">Timeline</button>
        <button class="switch" data-view="library">Biblioteca</button>
      </div>

      <div id="timelineView">
        <h2>Timeline</h2>
        <div id="timeline" class="list"></div>
      </div>

      <div id="libraryView" class="hidden">
        <h2>Biblioteca por tipo</h2>
        <div id="filters" class="filters"></div>
        <div id="library" class="list"></div>
      </div>
    </section>
  </main>

  <template id="postTemplate">
    <article class="post-item">
      <div class="meta">
        <span class="pill"></span>
        <time></time>
      </div>
      <h3 class="title"></h3>
      <p class="extra"></p>
      <p class="body"></p>
      <button class="danger">Excluir</button>
    </article>
  </template>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
